<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#101418">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="HappiestCompass">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Happiest Compass</title>
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="status-panel" aria-live="polite">
        <h1 id="targetName"><span aria-hidden="true">&#x1F31F;</span> Happiest Compass <span aria-hidden="true">&#x1F31F;</span></h1>
      </section>

      <section class="compass-card" aria-label="Compass">
        <div class="compass" id="compass">
          <div class="starburst-marker" aria-hidden="true">&#x1F31F;</div>
          <div class="tick tick-0"></div>
          <div class="tick tick-30"></div>
          <div class="tick tick-60"></div>
          <div class="tick tick-90"></div>
          <div class="tick tick-120"></div>
          <div class="tick tick-150"></div>
          <div class="needle" id="needle" aria-hidden="true">
            <span></span>
          </div>
          <div class="center-dot"></div>
        </div>
      </section>

      <section class="distance-panel">
        <p class="eyebrow">Distance</p>
        <div class="distance is-waiting" id="distanceValue">Waiting for location</div>
      </section>

      <button class="start-button" id="startButton" type="button">Start compass</button>
      <p class="helper" id="helperText">
        Works best outdoors on HTTPS. Vercel provides HTTPS automatically after deploy.
      </p>
      <nav class="site-links" aria-label="Other pages">
        <a href="utah-treasure-hunt-archive/">Utah Treasure Hunt Poem Archive</a>
      </nav>
    </main>

    <script src="app.js"></script>
  </body>
</html>
