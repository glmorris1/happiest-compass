    <meta name="theme-color" content="#17215f">
    <title>Perry High School Arrival</title>
    <link rel="stylesheet" href="arrival.css">

  <body>
    <main class="arrival-shell">

          <div class="head"><span class="hair hair-left"></span><span class="hair hair-right"></span><span class="bun"></span></div>

          <div class="tutu"></div>
          <div class="leg leg-left"></div>
          <div class="leg leg-right"></div>
