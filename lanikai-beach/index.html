<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0c4b5a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="LanikaiBeach">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Lanikai Beach Compass</title>
    <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/apple-touch-icon.png">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css?v=palm-emoji">
  </head>
  <body>
    <main class="app-shell">
      <section class="status-panel" aria-live="polite">
        <h1 id="targetName">Lanikai Beach</h1>
      </section>

      <section class="compass-card" aria-label="Compass">
        <div class="compass" id="compass">
          <div class="beach-marker" aria-hidden="true">🌴</div>
          <div class="tick tick-0"></div>
          <div class="tick tick-30"></div>
          <div class="tick tick-60"></div>
          <div class="tick tick-90"></div>
          <div class="tick tick-120"></div>
          <div class="tick tick-150"></div>
          <div class="needle" id="needle" aria-hidden="true">
            <span></span>
          </div>
          <div class="center-dot"></div>
        </div>
      </section>

      <section class="distance-panel">
        <p class="eyebrow">Distance</p>
        <div class="distance is-waiting" id="distanceValue">Waiting for location</div>
      </section>

      <button class="start-button" id="startButton" type="button">Start compass</button>
      <p class="helper" id="helperText">
        Works best outdoors on HTTPS. GitHub Pages provides HTTPS automatically after deploy.
      </p>
      <a class="credit" href="https://commons.wikimedia.org/wiki/File:Lanikai_Beach,_Hawaii.JPG" rel="noreferrer">
        Background photo: Wikimedia Commons / Travis.Thurston
      </a>
    </main>

    <script src="app.js"></script>
  </body>
</html>
