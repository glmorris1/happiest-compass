<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#2c2119">
    <title>1 Nephi Journey</title>
    <meta name="description" content="A cinematic reading map for 1 Nephi in the Book of Mormon.">
    <link rel="preload" href="assets/map-jerusalem.png" as="image">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar" aria-label="Reading progress">
        <button class="icon-button" type="button" aria-label="Open settings">
          <span></span><span></span><span></span>
        </button>
        <div class="title-lockup">
          <span>Book of Mormon</span>
          <h1>1 Nephi</h1>
        </div>
        <button class="avatar-button" type="button" aria-label="Profile">
          <svg viewBox="0 0 48 48" aria-hidden="true">
            <path d="M24 6c9.6 0 17.5 7.8 17.5 17.5S33.6 41 24 41 6.5 33.2 6.5 23.5 14.4 6 24 6Z"></path>
            <path d="M16 35c1.6-5 5-7.5 8-7.5s6.4 2.5 8 7.5"></path>
            <path d="M18.5 19.4c0-3.2 2.5-5.8 5.5-5.8s5.5 2.6 5.5 5.8-2.5 5.9-5.5 5.9-5.5-2.6-5.5-5.9Z"></path>
          </svg>
        </button>
      </header>

      <section class="progress-ribbon" aria-live="polite">
        <div>
          <span>Journey Progress</span>
          <strong id="chapterStatus">1 Nephi 1</strong>
        </div>
        <div class="progress-track" aria-hidden="true">
          <span id="meterFill"></span>
        </div>
        <b id="progressPercent">0%</b>
      </section>

      <section class="map-frame" aria-label="Journey map">
        <div class="map-scroll" id="mapScroll">
          <div class="map-world" id="mapWorld">
            <div class="art-stack" aria-hidden="true">
              <img class="art-slice" src="assets/map-jerusalem.png" alt="" loading="eager" decoding="async">
              <img class="art-slice" src="assets/map-wilderness.png" alt="" loading="lazy" decoding="async">
              <img class="art-slice" src="assets/map-coast.png" alt="" loading="lazy" decoding="async">
              <img class="art-slice" src="assets/map-jungle.png" alt="" loading="lazy" decoding="async">
            </div>

            <canvas class="effects-canvas" id="effectsCanvas" aria-hidden="true"></canvas>

            <svg class="route-svg" viewBox="0 0 100 3300" preserveAspectRatio="none" aria-hidden="true">
              <path class="route-shadow" d="M24 190 C36 278 62 300 72 405 C82 512 39 556 25 680 C9 827 60 872 75 1000 C92 1148 44 1228 33 1350 C20 1502 59 1550 70 1680 C85 1847 38 1900 29 2040 C20 2192 52 2276 68 2420 C85 2575 43 2633 33 2760 C21 2920 51 3022 76 3150"></path>
              <path class="route-stones" d="M24 190 C36 278 62 300 72 405 C82 512 39 556 25 680 C9 827 60 872 75 1000 C92 1148 44 1228 33 1350 C20 1502 59 1550 70 1680 C85 1847 38 1900 29 2040 C20 2192 52 2276 68 2420 C85 2575 43 2633 33 2760 C21 2920 51 3022 76 3150"></path>
              <path class="route-glow" id="routeGlow" pathLength="100" d="M24 190 C36 278 62 300 72 405 C82 512 39 556 25 680 C9 827 60 872 75 1000 C92 1148 44 1228 33 1350 C20 1502 59 1550 70 1680 C85 1847 38 1900 29 2040 C20 2192 52 2276 68 2420 C85 2575 43 2633 33 2760 C21 2920 51 3022 76 3150"></path>
            </svg>

            <div class="ambient cloud cloud-a" aria-hidden="true"></div>
            <div class="ambient cloud cloud-b" aria-hidden="true"></div>
            <div class="ambient bird bird-a" aria-hidden="true"></div>
            <div class="ambient bird bird-b" aria-hidden="true"></div>
            <div class="ambient fog fog-a" aria-hidden="true"></div>
            <div class="ambient fog fog-b" aria-hidden="true"></div>

            <div class="nodes" id="nodes"></div>

            <div class="explorer" id="traveler" aria-hidden="true">
              <svg viewBox="0 0 104 136">
                <path class="explorer-shadow" d="M17 120c15-12 56-12 70 0-10 10-60 10-70 0Z"></path>
                <path class="back-hair" d="M23 32c-2 18 1 31 9 41l40-2c9-11 12-25 9-42-13-14-45-15-58 3Z"></path>
                <path class="leg left-leg" d="M38 83l-10 29c4 6 12 7 17 2l8-30Z"></path>
                <path class="leg right-leg" d="M60 83l13 28c-3 7-12 9-18 4L45 86Z"></path>
                <path class="boot left-boot" d="M26 111c5 6 14 6 20 1l3 8c-7 6-21 5-27-2Z"></path>
                <path class="boot right-boot" d="M55 113c6 4 15 2 19-4l6 8c-5 8-19 11-27 4Z"></path>
                <path class="tunic" d="M25 52c13-9 40-9 54 0l7 40c-17 12-51 12-68 0Z"></path>
                <path class="sash" d="M31 51c12 13 30 25 48 34l-5 12C53 88 35 75 22 58Z"></path>
                <path class="cloak" d="M22 53c10-9 24-12 38-9-7 16-9 35-4 56-14 3-29 0-40-8Z"></path>
                <path class="belt" d="M21 76c19 7 43 7 62 0l3 10c-20 9-48 9-68 0Z"></path>
                <path class="belt-tie" d="M49 82h13v16H49Z"></path>
                <path class="arm left-arm" d="M26 57c-10 7-12 21-3 28 6 1 11-2 12-8-5-4-4-10 2-15Z"></path>
                <path class="arm right-arm" d="M78 57c10 7 12 21 3 28-6 1-11-2-12-8 5-4 4-10-2-15Z"></path>
                <path class="wrist left-wrist" d="M21 78c5 1 9 0 13-4l2 9c-4 4-10 6-16 4Z"></path>
                <path class="wrist right-wrist" d="M70 74c4 4 8 5 13 4l1 9c-6 2-12 0-16-4Z"></path>
                <path class="neck" d="M43 39h18v16H43Z"></path>
                <path class="face" d="M24 22c5-17 50-17 56 0 5 21-8 34-28 34S19 43 24 22Z"></path>
                <path class="hair" d="M22 26C31 7 65 8 80 23c-10-4-18-2-25 3-12-6-22-5-33 0Z"></path>
                <path class="side-hair left-side-hair" d="M24 33c-6 6-6 15 0 22 5-6 7-14 6-23Z"></path>
                <path class="side-hair right-side-hair" d="M80 33c6 6 6 15 0 22-5-6-7-14-6-23Z"></path>
                <path class="headband" d="M23 30c17-9 42-9 58 0l-3 9c-15-7-37-7-52 0Z"></path>
                <path class="feather-stem" d="M63 20c9-11 20-4 11 9-5 0-9-3-11-9Z"></path>
                <circle class="feather" cx="73" cy="18" r="8"></circle>
                <circle class="eye" cx="42" cy="35" r="3.2"></circle>
                <circle class="eye" cx="62" cy="35" r="3.2"></circle>
                <path class="smile" d="M41 44c7 7 16 7 23 0"></path>
                <path class="cheek left-cheek" d="M32 42c3 2 6 2 9 0"></path>
                <path class="cheek right-cheek" d="M63 42c3 2 6 2 9 0"></path>
              </svg>
            </div>
          </div>
        </div>
      </section>

      <footer class="bottom-panel">
        <button class="panel-button" id="backButton" type="button">Back</button>
        <div class="completed-banner">
          <span id="completedText">Chapters Completed: 0 / 22</span>
        </div>
        <button class="panel-button primary" id="nextButton" type="button">Next</button>
        <button class="panel-button reset" id="resetButton" type="button">Reset</button>
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
