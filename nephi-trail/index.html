<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#2c2119">
    <title>1 Nephi Journey</title>
    <meta name="description" content="A cinematic reading map for 1 Nephi in the Book of Mormon.">
    <link rel="preload" href="assets/map-painterly.png" as="image">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar" aria-label="Reading progress">
        <button class="icon-button" type="button" aria-label="Open settings">
          <span></span><span></span><span></span>
        </button>
        <div class="title-lockup">
          <span>Book of Mormon</span>
          <h1>1 Nephi</h1>
        </div>
        <button class="avatar-button" type="button" aria-label="Profile">
          <svg viewBox="0 0 48 48" aria-hidden="true">
            <path d="M24 6c9.6 0 17.5 7.8 17.5 17.5S33.6 41 24 41 6.5 33.2 6.5 23.5 14.4 6 24 6Z"></path>
            <path d="M16 35c1.6-5 5-7.5 8-7.5s6.4 2.5 8 7.5"></path>
            <path d="M18.5 19.4c0-3.2 2.5-5.8 5.5-5.8s5.5 2.6 5.5 5.8-2.5 5.9-5.5 5.9-5.5-2.6-5.5-5.9Z"></path>
          </svg>
        </button>
      </header>

      <section class="progress-ribbon" aria-live="polite">
        <div>
          <span>Journey Progress</span>
          <strong id="chapterStatus">1 Nephi 1</strong>
        </div>
        <div class="progress-track" aria-hidden="true">
          <span id="meterFill"></span>
        </div>
        <b id="progressPercent">0%</b>
      </section>

      <section class="map-frame" aria-label="Journey map">
        <div class="map-scroll" id="mapScroll">
          <div class="map-world" id="mapWorld">
            <img class="map-layer map-base" src="assets/map-painterly.png" alt="" loading="eager" decoding="async">
            <img class="map-layer map-mid" src="assets/map-mid.svg" alt="" loading="lazy" decoding="async">
            <img class="map-layer map-foreground" src="assets/map-foreground.svg" alt="" loading="lazy" decoding="async">

            <canvas class="effects-canvas" id="effectsCanvas" aria-hidden="true"></canvas>

            <svg class="route-svg" viewBox="0 0 100 3300" preserveAspectRatio="none" aria-hidden="true">
              <path class="route-shadow" d="M24 190 C36 278 62 300 72 405 C82 512 39 556 25 680 C9 827 60 872 75 1000 C92 1148 44 1228 33 1350 C20 1502 59 1550 70 1680 C85 1847 38 1900 29 2040 C20 2192 52 2276 68 2420 C85 2575 43 2633 33 2760 C21 2920 51 3022 76 3150"></path>
              <path class="route-stones" d="M24 190 C36 278 62 300 72 405 C82 512 39 556 25 680 C9 827 60 872 75 1000 C92 1148 44 1228 33 1350 C20 1502 59 1550 70 1680 C85 1847 38 1900 29 2040 C20 2192 52 2276 68 2420 C85 2575 43 2633 33 2760 C21 2920 51 3022 76 3150"></path>
              <path class="route-glow" id="routeGlow" pathLength="100" d="M24 190 C36 278 62 300 72 405 C82 512 39 556 25 680 C9 827 60 872 75 1000 C92 1148 44 1228 33 1350 C20 1502 59 1550 70 1680 C85 1847 38 1900 29 2040 C20 2192 52 2276 68 2420 C85 2575 43 2633 33 2760 C21 2920 51 3022 76 3150"></path>
            </svg>

            <div class="ambient cloud cloud-a" aria-hidden="true"></div>
            <div class="ambient cloud cloud-b" aria-hidden="true"></div>
            <div class="ambient bird bird-a" aria-hidden="true"></div>
            <div class="ambient bird bird-b" aria-hidden="true"></div>
            <div class="ambient fog fog-a" aria-hidden="true"></div>
            <div class="ambient fog fog-b" aria-hidden="true"></div>

            <div class="nodes" id="nodes"></div>

            <div class="explorer" id="traveler" aria-hidden="true">
              <svg viewBox="0 0 92 126">
                <path class="explorer-shadow" d="M16 113c13-12 51-12 64 0-8 10-55 10-64 0Z"></path>
                <path class="leg left-leg" d="M36 74l-9 31 11 4 10-31Z"></path>
                <path class="leg right-leg" d="M54 74l12 30-10 6-14-31Z"></path>
                <path class="tunic" d="M25 42c13-8 30-8 43 0l8 45c-17 10-41 10-58 0Z"></path>
                <path class="cloak" d="M20 45c9-8 22-10 34-7-6 16-8 34-5 54-12 2-24 0-34-6Z"></path>
                <path class="belt" d="M22 70c16 6 36 6 52 0l2 9c-17 8-39 8-56 0Z"></path>
                <path class="neck" d="M39 34h15v14H39Z"></path>
                <path class="face" d="M27 17c5-13 32-13 38 0 6 16-4 30-19 30S21 33 27 17Z"></path>
                <path class="hair" d="M25 20C30 3 57 2 67 18c-7-3-12-1-17 3-8-5-16-5-25-1Z"></path>
                <path class="headband" d="M26 24c12-7 27-7 40 0l-2 7c-11-6-25-6-36 0Z"></path>
                <path class="feather" d="M52 8c10-12 20-5 10 9-5-1-8-4-10-9Z"></path>
                <circle class="eye" cx="38" cy="28" r="2.4"></circle>
                <circle class="eye" cx="54" cy="28" r="2.4"></circle>
                <path class="smile" d="M39 36c5 4 10 4 15 0"></path>
              </svg>
            </div>
          </div>
        </div>
      </section>

      <footer class="bottom-panel">
        <button class="panel-button" id="backButton" type="button">Back</button>
        <div class="completed-banner">
          <span id="completedText">Chapters Completed: 0 / 22</span>
        </div>
        <button class="panel-button primary" id="nextButton" type="button">Next</button>
        <button class="panel-button reset" id="resetButton" type="button">Reset</button>
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
