<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#22160f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="PirateCompass">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Pirate Treasure Compass</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css?v=parchment-left">
  </head>
  <body>
    <main class="app-shell">
      <header class="top-chrome" aria-hidden="true">
        <div class="time">9:41</div>
        <button class="icon-button menu-button" type="button" aria-label="Menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <button class="icon-button gear-button" type="button" aria-label="Settings">
          <span></span>
        </button>
      </header>

      <section class="status-panel" aria-live="polite">
        <p class="connected">Connected to</p>
        <h1 id="targetName">The Treasure</h1>
        <p class="summary-distance" id="summaryDistance">Awaiting location</p>
      </section>

      <section class="compass-card" aria-label="Compass">
        <div class="pocket-loop" aria-hidden="true"></div>
        <div class="pocket-crown" aria-hidden="true"></div>
        <div class="compass" id="compass">
          <div class="ornate-bezel" aria-hidden="true"></div>
          <div class="rose" aria-hidden="true">
            <span class="rose-point rose-n"></span>
            <span class="rose-point rose-e"></span>
            <span class="rose-point rose-s"></span>
            <span class="rose-point rose-w"></span>
            <span class="rose-point rose-ne"></span>
            <span class="rose-point rose-se"></span>
            <span class="rose-point rose-sw"></span>
            <span class="rose-point rose-nw"></span>
          </div>
          <div class="cardinal north" aria-hidden="true">N</div>
          <div class="cardinal east" aria-hidden="true">E</div>
          <div class="cardinal south" aria-hidden="true">S</div>
          <div class="cardinal west" aria-hidden="true">W</div>
          <div class="ordinal ne" aria-hidden="true">NE</div>
          <div class="ordinal se" aria-hidden="true">SE</div>
          <div class="ordinal sw" aria-hidden="true">SW</div>
          <div class="ordinal nw" aria-hidden="true">NW</div>
          <div class="tick tick-0"></div>
          <div class="tick tick-30"></div>
          <div class="tick tick-60"></div>
          <div class="tick tick-90"></div>
          <div class="tick tick-120"></div>
          <div class="tick tick-150"></div>
          <div class="needle" id="needle" aria-hidden="true">
            <span></span>
          </div>
          <div class="center-dot"></div>
        </div>
      </section>

      <section class="direction-panel">
        <p class="eyebrow">The treasure lies this way</p>
        <div class="direction-value" id="directionValue">--</div>
        <div class="degree-value" id="degreeValue">--</div>
        <div class="distance is-waiting" id="distanceValue">Waiting for location</div>
      </section>

      <button class="start-button" id="startButton" type="button">Start compass</button>
      <p class="helper" id="helperText">Works best outdoors on HTTPS.</p>

      <nav class="bottom-nav" aria-label="App sections">
        <a class="nav-item is-active" href="./" aria-current="page">
          <span class="nav-icon compass-icon" aria-hidden="true"></span>
          Compass
        </a>
        <span class="nav-item">
          <span class="nav-icon clue-icon" aria-hidden="true"></span>
          Clues
        </span>
        <span class="nav-item">
          <span class="nav-icon chest-icon" aria-hidden="true"></span>
          Treasure
        </span>
        <span class="nav-item">
          <span class="nav-icon gear-small" aria-hidden="true"></span>
          Settings
        </span>
      </nav>
    </main>

    <script src="app.js"></script>
  </body>
</html>
