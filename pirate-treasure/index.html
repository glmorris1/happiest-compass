<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#22160f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="PirateCompass">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Pirate Treasure Compass</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css?v=movie-prop-images">
  </head>
  <body>
    <main class="app-shell">
      <section class="status-panel" aria-live="polite">
        <h1>This Way!</h1>
      </section>

      <section class="compass-card" aria-label="Compass">
        <div class="compass" id="compass">
          <img class="compass-art" src="assets/pirate-compass-face.png" alt="" aria-hidden="true">
          <div class="needle" id="needle" aria-hidden="true">
            <img src="assets/pirate-needle.png" alt="">
          </div>
        </div>
      </section>

      <section class="direction-panel">
        <p class="eyebrow">Distance to target</p>
        <div class="distance is-waiting" id="distanceValue">Waiting for location</div>
      </section>

      <button class="start-button" id="startButton" type="button">Start compass</button>
      <p class="helper" id="helperText">Works best outdoors on HTTPS.</p>
    </main>

    <script src="app.js?v=strict-10ft-arrival"></script>
  </body>
</html>
